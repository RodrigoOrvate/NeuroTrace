# ============================================================
#  NeuroTrace — Build macOS (.app + .dmg)
#  Gera um único DMG Intel (x86_64) compatível com macOS 12+.
#  Em Macs Apple Silicon (M1/M2/M3), roda via Rosetta 2.
#
#  Runners removidos pelo GitHub:
#    • macos-12 — removido em janeiro/2025
#    • macos-13 — removido em dezembro/2025
# ============================================================

name: Build macOS DMG

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-macos:
    runs-on: macos-15-intel
    name: Build DMG (Intel — macOS 12+)
    timeout-minutes: 45

    steps:
      # ─── 1. Checkout do código ───
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ─── 2. Configurar Python ───
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── 3. Cache de dependências pip ───
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-15-intel-pip-pyside6-pyinstaller-v1
          restore-keys: |
            macos-15-intel-pip-

      # ─── 4. Instalar dependências ───
      - name: Instalar dependências Python
        timeout-minutes: 20
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary "numpy==1.26.4" "PySide6==6.7.3" "pandas==2.2.2" "openpyxl==3.1.2" "requests==2.32.3" "pyinstaller==6.3.0"
          python -c "from PySide6.QtWidgets import QApplication; print('✅ PySide6 OK')"
          python -c "import PyInstaller; print('✅ PyInstaller', PyInstaller.__version__)"

      # ─── 5. Converter ícone .ico para .icns ───
      - name: Converter ícone para .icns
        run: |
          mkdir -p NeuroTrace.iconset
          sips -s format png memorylab.ico --out icon_base.png
          sips -z 16 16     icon_base.png --out NeuroTrace.iconset/icon_16x16.png
          sips -z 32 32     icon_base.png --out NeuroTrace.iconset/icon_16x16@2x.png
          sips -z 32 32     icon_base.png --out NeuroTrace.iconset/icon_32x32.png
          sips -z 64 64     icon_base.png --out NeuroTrace.iconset/icon_32x32@2x.png
          sips -z 128 128   icon_base.png --out NeuroTrace.iconset/icon_128x128.png
          sips -z 256 256   icon_base.png --out NeuroTrace.iconset/icon_128x128@2x.png
          sips -z 256 256   icon_base.png --out NeuroTrace.iconset/icon_256x256.png
          sips -z 512 512   icon_base.png --out NeuroTrace.iconset/icon_256x256@2x.png
          sips -z 512 512   icon_base.png --out NeuroTrace.iconset/icon_512x512.png
          sips -z 1024 1024 icon_base.png --out NeuroTrace.iconset/icon_512x512@2x.png
          iconutil -c icns NeuroTrace.iconset -o memorylab.icns
          echo "✅ Ícone .icns criado"
          ls -lh memorylab.icns

      # ─── 6. Gerar .app com PyInstaller ───
      - name: Gerar .app bundle com PyInstaller
        timeout-minutes: 15
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          echo "▶ Iniciando PyInstaller (deployment target: 12.0)..."
          python -m PyInstaller packaging/main_macos.spec --clean --noconfirm
          echo "✅ PyInstaller concluído"

          # Aguarda o SO liberar file locks da pasta dist/ antes do hdiutil
          sleep 5

      # ─── 7. Verificar estrutura do .app (debug) ───
      - name: Verificar .app bundle
        run: |
          if [ ! -d "dist/NeuroTrace.app" ]; then
            echo "❌ ERRO: Falha ao criar o .app bundle"
            ls -la dist/ || echo "(pasta dist não encontrada)"
            exit 1
          fi
          echo "✅ .app bundle criado"
          du -sh dist/NeuroTrace.app
          echo "── Estrutura de dist/ ──"
          ls -R dist/

      # ─── 8. Criar o .dmg ───
      - name: Criar .dmg installer
        timeout-minutes: 10
        run: |
          APP_NAME="NeuroTrace"
          VERSION="2.0.0"
          DMG_NAME="${APP_NAME}_macOS_v${VERSION}"
          DMG_DIR="dmg_staging"
          DMG_OUTPUT="installer_output/${DMG_NAME}.dmg"

          # Desmontar qualquer volume "NeuroTrace" que possa estar preso de runs anteriores
          hdiutil detach "/Volumes/${APP_NAME}" -force 2>/dev/null || true

          # Remover .dmg residual de cache anterior
          rm -f installer_output/*.dmg 2>/dev/null || true

          rm -rf "${DMG_DIR}"
          mkdir -p "${DMG_DIR}"
          mkdir -p "installer_output"

          # Copiar .app para diretório de staging (nome diferente do DMG final)
          cp -R "dist/${APP_NAME}.app" "${DMG_DIR}/"
          ln -s /Applications "${DMG_DIR}/Applications"

          # Aguarda Spotlight e outros processos liberarem handles nos arquivos de staging
          sleep 10

          echo "▶ Criando DMG: ${DMG_OUTPUT}"
          echo "── Conteúdo do staging ──"
          ls -la "${DMG_DIR}/"

          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${DMG_DIR}" \
            -ov \
            -format UDZO \
            -layout SPUD \
            -fs HFS+ \
            "${DMG_OUTPUT}"

          rm -rf "${DMG_DIR}"
          echo "✅ DMG criado: ${DMG_OUTPUT}"
          ls -lh "${DMG_OUTPUT}"

      # ─── 9. Upload como artefato ───
      - name: Upload DMG como artefato
        uses: actions/upload-artifact@v4
        with:
          name: NeuroTrace_macOS_DMG
          path: installer_output/*.dmg
          retention-days: 90

      # ─── 10. Anexar à Release ───
      - name: Anexar DMG à Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/*.dmg
