# ============================================================
#  NeuroTrace — Build Windows (.exe + Setup Inno Setup)
#  Gera o instalador EXE automaticamente via GitHub Actions
# ============================================================

name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pandas openpyxl requests pyinstaller
          python -c "from PyQt5.QtWidgets import QApplication; print('PyQt5 OK')"

      - name: Gerar .exe com PyInstaller
        run: |
          python -m PyInstaller packaging/main.spec --clean --noconfirm

      - name: Verificar .exe
        run: |
          if (-not (Test-Path "dist\NeuroTrace.exe")) {
            Write-Error "ERRO: Falha ao criar o .exe"
            exit 1
          }
          Write-Host "exe criado com sucesso"
          Get-ChildItem dist\

      - name: Instalar Inno Setup 6
        run: |
          choco install innosetup --yes

      - name: Gerar instalador Setup.exe
        run: |
          New-Item -ItemType Directory -Force -Path installer_output
          iscc packaging\installer.iss
          Get-ChildItem -Path installer_output\

      - name: Upload Setup como artefato
        uses: actions/upload-artifact@v4
        with:
          name: NeuroTrace_Windows_Setup
          path: installer_output/*.exe
          retention-days: 90

      - name: Upload EXE portatil como artefato
        uses: actions/upload-artifact@v4
        with:
          name: NeuroTrace_Windows_Portable
          path: dist/NeuroTrace.exe
          retention-days: 90

      - name: Anexar arquivos a Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/*.exe
            dist/NeuroTrace.exe
